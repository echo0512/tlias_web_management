spring:
  application:
    name: tlias-web-management

  # 数据库连接池
  datasource:
    url: jdbc:mysql://localhost:3306/tlias
    username: root
    #password: ${DB_PASSWORD} 最终应用时使用，不要硬编码
    password: ${DB_PASSWORD}

#mybatis相关配置
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    #开启驼峰命名转换
    map-underscore-to-camel-case: true